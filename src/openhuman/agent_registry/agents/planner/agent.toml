id = "planner"
display_name = "Planner"
delegate_name = "plan"
when_to_use = "Architect — break a complex task into a small DAG of subtasks with explicit acceptance criteria. Reads memory and searches the web to ground plans in real context. Read-only; produces JSON, not code."
temperature = 0.4
max_iterations = 8
iteration_policy = "extended"
max_result_chars = 8000
sandbox_mode = "read_only"
omit_identity = true
omit_memory_context = false
omit_safety_preamble = true
omit_skills_catalog = true
# Memory is no longer pre-fetched eagerly before every turn. The planner
# keeps `omit_memory_context = false`, so it still receives the cheap
# per-turn memory recall; deep memory-tree walks are the orchestrator's
# on-demand concern (`delegate_retrieve_memory`), and the orchestrator
# hands the planner grounded context in the delegation prompt.

# Spawn hierarchy: this is the deep-thinking tier (reasoning model hint).
# The planner produces a DAG of leaf tasks for downstream workers; it
# must NOT delegate to another `reasoning` agent. The loader rejects
# any same-tier entry added to a future `subagents` list.
agent_tier = "reasoning"

[model]
hint = "reasoning"

[tools]
# Read + research only. The planner produces plans — it never mutates
# the workspace, memory, or state. Any writes the plan requires get
# executed by downstream agents (code_executor, archivist, …) at the
# orchestrator's direction.
#
# Composio meta-tools are included so the planner can inspect connected
# integrations, list available actions, and pull data needed to ground
# a plan. `sandbox_mode = "read_only"` above triggers the agent-level
# gate in `composio_execute` that rejects Write/Admin-scoped action
# slugs (#685), so the planner cannot send email / create pages / etc.
# even though `composio_execute` is on this list. Only `Read`-scoped
# actions slip past the gate.
named = [
    "file_read",
    # NOTE: `agent_prepare_context` is intentionally NOT here. When the planner
    # runs via `delegate_plan` it executes under the orchestrator's
    # PARENT_CONTEXT (run_subagent filters the child tool surface but does not
    # install a planner-scoped ParentExecutionContext), so a nested scout would
    # render the orchestrator's visible catalog/session, not the planner's.
    # Context scouting is the orchestrator's first-message job; keep it there.
    # Read-only nav primitives from #1208. `edit`, `apply_patch`, `lsp`
    # are intentionally NOT included — sandbox_mode = "read_only" above
    # forbids workspace mutations, and downstream agents do the writing.
    # `todowrite` + `plan_exit` let the planner emit a structured
    # todo list and a stable [plan_exit] marker for the orchestrator.
    "grep",
    "glob",
    "list",
    "todowrite",
    "plan_exit",
    "web_fetch",
    "web_search_tool",
    # Grounded research + market-data lookups so plans can be anchored in
    # real numbers (stock/crypto prices) and current web context, not just
    # whatever the model happens to remember.
    "parallel_search",
    "parallel_chat",
    "parallel_research",
    "stock_quote",
    "stock_exchange_rate",
    "stock_crypto_series",
    "stock_commodity",
    "composio_list_toolkits",
    "composio_list_connections",
    "composio_list_tools",
    "composio_execute",
    # MCP discovery (read-only) so plans can be grounded in the user's
    # connected MCP servers — what's connected (`mcp_registry_status`),
    # which servers are installed (`mcp_registry_installed_list`), and what
    # tools each connected server exposes (`mcp_registry_list_tools`). All
    # three are `PermissionLevel::ReadOnly` (no side effects), so they fit
    # the read-only sandbox. `mcp_registry_tool_call` is deliberately NOT
    # here: unlike `composio_execute` (gated to Read-scoped slugs by the
    # sandbox), an MCP tool call invokes an arbitrary server tool the core
    # cannot classify as read vs. write, so there is no safe read-only gate.
    # Executing connected-MCP tools stays with `mcp_agent` (`use_mcp_server`).
    "mcp_registry_status",
    "mcp_registry_installed_list",
    "mcp_registry_list_tools",
]
