id = "context_scout"
display_name = "Context Scout"
when_to_use = "Pre-flight context collector. Reads memory, the user's goals/profile, connected integrations, and the web, then returns a tight context bundle plus a recommended plan of next tool calls. Read-only; produces a structured bundle, not actions."
temperature = 0.3
# Bumped from 6: the scout now has a wider read-only gathering surface
# (transcripts, threads, skills) so it may need a couple more steps to recall →
# check skills → assess before emitting the bundle.
max_iterations = 8
iteration_policy = "extended"
# Cap on the returned bundle. The runner truncates the final output to this
# many characters (char-safe) before handing it back to the parent, so the
# orchestrator's context only ever grows by a bounded amount. Bumped from 4000
# to leave room for the `recommended_skills` block alongside the summary and
# `recommended_tool_calls`.
max_result_chars = 5000
sandbox_mode = "read_only"

# Spawn hierarchy: leaf worker. The scout gathers context and stops — it
# never delegates onward. (No `[subagents]` block; loader rejects any
# subagents on a worker tier.)
agent_tier = "worker"

omit_identity = true
omit_memory_context = true
omit_safety_preamble = true
omit_skills_catalog = true
# Keep PROFILE.md (onboarding enrichment — the user's stated goals) and
# MEMORY.md (archivist-curated long-term memory) IN the prompt: the scout's
# whole job is to ground the orchestrator in who the user is and what they
# want, so it must be able to read goals/profile directly.
omit_profile = false
omit_memory_md = false

[model]
# Multi-step gathering loop (recall → maybe fetch → assess), so the agentic
# tier fits — not the slow reasoning tier (the scout is meant to be cheap).
hint = "agentic"

[tools]
# Curated read-only context-gathering surface. No writes, no shell, no
# delegation — the scout collects and reports. Every tool here must be
# genuinely read-only: the scout auto-runs on prompt-injectable input, so a
# write-capable tool would be an injection foothold.
named = [
    # Targeted recall over the memory namespaces (global, background, …).
    # NOTE: `memory_tree` is intentionally NOT here. That tool bundles a
    # write mode (`ingest_document` → MemoryTreeIngestDocumentTool) under a
    # ReadOnly-declared wrapper, so an auto-run, prompt-injectable scout could
    # mutate memory ("remember this document") despite running read-only.
    # Retrieval-only `memory_recall` covers the scout's needs safely.
    "memory_recall",
    # Transcripts: recall what the user said/decided in earlier chats. Backed
    # by the cross-thread trigram index; read-only and workspace-scoped.
    "transcript_search",
    # Thread metadata: enumerate / read titles+labels to locate the right past
    # conversation before pulling its transcript. Read-only (the create/update/
    # delete thread tools are deliberately excluded).
    "thread_list",
    "thread_read",
    # Read the messages of a located thread (read-only). Complements
    # `transcript_search` (content search) for title/label lookups like
    # "summarize my Database work thread", where the thread is found by metadata
    # but its transcript still has to be pulled.
    "thread_message_list",
    # Skills: discover which skills are installed and search the registry so the
    # scout can recommend a relevant one back to the orchestrator. All three are
    # read-only — `skill_registry_install` / `_uninstall` are deliberately out.
    "list_workflows",
    "skill_registry_browse",
    "skill_registry_search",
    # Fresh external facts when the question needs them.
    "web_search_tool",
    "web_fetch",
]
